<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spreen Fan Web</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    color: white;
    text-align: center;

    /* 🎨 fondo verde + gris + negro */
    background: linear-gradient(135deg, #0f3d2e, #2b2b2b, #000000);
}

header {
    background: #1f7a4d;
    padding: 20px;
    font-size: 28px;
    font-weight: bold;
}

.card {
    background: rgba(0, 0, 0, 0.6);
    margin: 20px auto;
    padding: 20px;
    width: 80%;
    border-radius: 12px;
}

img {
    width: 250px;
    border-radius: 12px;
    margin: 10px;
    border: 2px solid #1f7a4d;
}

button {
    margin-top: 10px;
    padding: 10px 15px;
    border: none;
    border-radius: 8px;
    background: #1f7a4d;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #2ecc71;
}
</style>

</head>

<body>

<header>
🎮 Spreen Fan Web
</header>

<div class="card">

    <h2>¿Quién es Spreen?</h2>
    <p>Streamer argentino conocido por Minecraft, humor y streams.</p>

    <!-- 🖼️ TU FOTO -->
    <img src="spreen.jpg" alt="Spreen">

</div>

<div class="card">

    <h2>Redes</h2>

    <button onclick="window.open('https://www.youtube.com/@Spreen')">
        YouTube
    </button>

    <button onclick="window.open('https://kick.com/')">
        Kick
    </button>

</div>

</body>
</html>
